<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FoodRadar</title>
  <link rel="stylesheet" href="style.css">

  <!-- 🗺️ LEAFLET CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

<header>
  <h1>📍 FoodRadar</h1>

  <nav>
    <a href="map.html">Explore Food</a>
    <a href="vendor.html">Become a Vendor</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">

  <h2>Discover food around you in Kumasi</h2>

  <p>
    Find local dishes, street food and vendors near you.
  </p>

  <div class="buttons">

    <a class="btn primary" href="map.html">
      📍 Explore Map
    </a>

    <a class="btn secondary" href="vendor.html">
      👨‍🍳 Become a Vendor
    </a>

  </div>

</section>

<!-- FOOD SECTION -->
<section class="food-section">

  <h2>Popular Food Near You</h2>

  <div id="food-container" class="food-container"></div>

</section>

<!-- MAP SECTION -->
<section class="map-section">

  <h2>🗺️ Food Map</h2>

  <div id="map"></div>

</section>

<!-- ========================= -->
<!-- SCRIPTS (CORRECT ORDER) -->
<!-- ========================= -->

<!-- Leaflet FIRST (IMPORTANT) -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Supabase (ready for future auth + database) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<!-- App logic -->
<script src="app.js"></script>

</body>
</html>
