<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vendor Login - FoodRadar</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>👨‍🍳 FoodRadar Login</h1>
</header>

<!-- ======================= -->
<!-- LOGIN FORM -->
<!-- ======================= -->
<section style="max-width:400px;margin:auto;">

  <h2>Vendor Login</h2>

  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button onclick="login()">Login</button>

</section>

<hr>

<!-- ======================= -->
<!-- REGISTER FORM -->
<!-- ======================= -->
<section style="max-width:400px;margin:auto;">

  <h3>Create Account</h3>

  <input id="nameR" placeholder="Name"><br><br>
  <input id="emailR" placeholder="Email"><br><br>
  <input id="passwordR" type="password" placeholder="Password"><br><br>

  <button onclick="register()">Create Account</button>

</section>

<!-- ======================= -->
<!-- SUPABASE CORE -->
<!-- ======================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<!-- ======================= -->
<!-- AUTH LOGIC -->
<!-- ======================= -->
<script src="auth.js"></script>

<!-- ======================= -->
<!-- UI FUNCTIONS -->
<!-- ======================= -->
<script>
function login(){
    loginVendor(
        document.getElementById("email").value,
        document.getElementById("password").value
    );
}

function register(){
    registerVendor(
        document.getElementById("nameR").value,
        document.getElementById("emailR").value,
        document.getElementById("passwordR").value
    );
}
</script>

</body>
</html>
