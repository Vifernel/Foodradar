<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodRadar — Sign in</title>
<meta name="description" content="Sign in to FoodRadar.">
<meta name="theme-color" content="#14101c">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%2314101c'/%3E%3Ccircle cx='16' cy='16' r='10' fill='none' stroke='%23ffc857' stroke-opacity='0.35'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%23ff7a33'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <a class="brand" href="index.html">
    <span class="brand-mark" aria-hidden="true"></span>
    FoodRadar
  </a>
  <nav class="site-nav">
    <a href="map.html">Explore map</a>
    <a href="vendor.html">Become a vendor</a>
    <a href="login.html" class="nav-cta">Sign in</a>
  </nav>
</header>

<main class="auth-main">
  <div class="auth-card">
    <p class="eyebrow">Welcome to FoodRadar</p>
    <h1>Join FoodRadar</h1>

    <div class="auth-tabs">
      <button type="button" class="auth-tab active" data-tab="signup">Create account</button>
      <button type="button" class="auth-tab" data-tab="signin">Sign in</button>
    </div>

    <form id="signup-form" class="auth-form" data-panel="signup">
      <label>
        Name
        <input type="text" name="name" placeholder="Kwame Mensah" required>
      </label>
      <label>
        Email
        <input type="email" name="email" placeholder="you@example.com" required>
      </label>
      <label>
        Password
        <input type="password" name="password" placeholder="••••••••" required>
      </label>
      <button type="submit" class="btn btn-primary full">Create account</button>
    </form>

    <form id="login-form" class="auth-form hidden" data-panel="signin">
      <label>
        Email
        <input type="email" name="email" placeholder="you@example.com" required>
      </label>
      <label>
        Password
        <input type="password" name="password" placeholder="••••••••" required>
      </label>
      <button type="submit" class="btn btn-primary full">Sign in</button>
    </form>

    <div id="auth-message" class="auth-message" hidden></div>

    <p class="auth-note">Just browsing? <a href="map.html">Explore the map</a> — no account needed.</p>
    <p class="auth-note">Selling food? <a href="vendor.html">Become a vendor</a> instead.</p>
  </div>
</main>

<footer class="site-footer">
  <p>FoodRadar — Find food. Discover culture.</p>
  <p class="footer-sub">Starting in Ghana. Expanding across West Africa.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>

</body>
</html>
