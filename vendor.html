<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vendor Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>👨‍🍳 Vendor Dashboard</h1>
</header>

<!-- ========================= -->
<!-- ADD FOOD FORM -->
<!-- ========================= -->
<section style="max-width:500px;margin:auto;">

  <h2>Add New Food</h2>

  <input id="name" placeholder="Food name"><br><br>
  <input id="price" placeholder="Price"><br><br>
  <input id="image" placeholder="Image URL"><br><br>
  <textarea id="desc" placeholder="Description"></textarea><br><br>

  <button onclick="addFood()">➕ Add Food</button>

</section>

<hr>

<!-- ========================= -->
<!-- MY FOODS LIST -->
<!-- ========================= -->
<section style="max-width:700px;margin:auto;">

  <h2>🍽 My Foods</h2>
  <div id="myFoods"></div>

</section>

<!-- ========================= -->
<!-- SUPABASE CORE -->
<!-- ========================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<!-- ========================= -->
<!-- VENDOR LOGIC -->
<!-- ========================= -->
<script src="vendor.js"></script>

</body>
</html>
