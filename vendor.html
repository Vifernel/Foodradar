<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vendor Dashboard - FoodRadar</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>👨‍🍳 Vendor Dashboard</h1>
</header>

<section>

  <h2>Add New Food</h2>

  <input type="text" id="foodName" placeholder="Food name">
  <input type="text" id="foodImage" placeholder="Image URL (assets/...)">
  <input type="text" id="foodPrice" placeholder="Price (GHS)">
  <input type="text" id="foodLocation" placeholder="Location name">

  <button onclick="addFood()">➕ Add Food</button>

</section>

<script src="vendor.js"></script>

</body>
</html>
